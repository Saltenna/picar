<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiCar Fleet Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
    #lastUpdate { font-size: 12px; color: #555; }

    #roverGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .rover-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .rover-card.online  { border-color: #1a4a2a; }
    .rover-card.offline { border-color: #3a1a1a; opacity: 0.7; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .rover-id { font-size: 16px; font-weight: 600; }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online  { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
    .status-dot.offline { background: #555; }

    .rover-ip { font-size: 12px; color: #666; margin-bottom: 10px; }

    .flags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      min-height: 24px;
    }
    .flag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .flag.battery { background: #4a2800; color: #f90; }
    .flag.mobile  { background: #3a0000; color: #f44; }

    .card-link {
      display: block;
      text-align: center;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 6px;
      color: #7af;
      text-decoration: none;
      font-size: 13px;
      transition: background 0.15s;
    }
    .card-link:hover { background: #333; }
    .card-link.disabled {
      color: #444;
      pointer-events: none;
    }

    #empty {
      text-align: center;
      color: #444;
      margin-top: 60px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>PiCar Fleet Manager</h1>
    <span id="lastUpdate">—</span>
  </header>
  <div id="roverGrid"></div>
  <div id="empty" style="display:none">No rovers seen yet — waiting for heartbeats…</div>

  <script>
    async function poll() {
      try {
        const res  = await fetch('/api/rovers');
        const list = await res.json();

        document.getElementById('lastUpdate').textContent =
          'Updated ' + new Date().toLocaleTimeString();

        const grid = document.getElementById('roverGrid');
        const empty = document.getElementById('empty');

        if (list.length === 0) {
          grid.innerHTML = '';
          empty.style.display = '';
          return;
        }
        empty.style.display = 'none';

        // Sort: online first, then by id
        list.sort((a, b) => {
          if (a.online !== b.online) return b.online - a.online;
          return a.id.localeCompare(b.id);
        });

        grid.innerHTML = list.map(r => {
          const state = r.online ? 'online' : 'offline';
          const flags = [];
          if (r.batteryTrouble) flags.push('<span class="flag battery">⚡ Battery</span>');
          if (r.notMobile)      flags.push('<span class="flag mobile">⚠ Not Mobile</span>');

          return `
            <div class="rover-card ${state}">
              <div class="card-header">
                <span class="rover-id">${r.id}</span>
                <span class="status-dot ${state}" title="${state}"></span>
              </div>
              <div class="rover-ip">${r.ip}</div>
              <div class="flags">${flags.join('') || ''}</div>
              <a class="card-link ${r.online ? '' : 'disabled'}"
                 href="${r.controllerUrl}" target="_blank">
                ${r.online ? '▶ Open Controller' : 'Offline'}
              </a>
            </div>`;
        }).join('');

      } catch (e) {
        document.getElementById('lastUpdate').textContent = 'Error fetching rovers';
      }
    }

    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
