logLevel: info
logDestinations: [stdout]

# Keep MediaMTX narrowly scoped to browser video for the rover UI.
rtsp: false
rtmp: false
hls: false
srt: false

webrtc: true
webrtcAddress: :8889
webrtcEncryption: true
webrtcServerKey: /opt/picar/certs/key.pem
webrtcServerCert: /opt/picar/certs/cert.pem
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []
webrtcHandshakeTimeout: 20s
webrtcTrackGatherTimeout: 5s

paths:
  cam:
    source: rpiCamera
    sourceOnDemand: true
    sourceOnDemandCloseAfter: 5s
    rpiCameraCamID: 0
    # Stable radio-link preset. Fast motion makes H.264 harder to compress, so
    # leave enough headroom for Wi-Fi/WebRTC instead of running the encoder hot.
    rpiCameraWidth: 480
    rpiCameraHeight: 360
    rpiCameraFPS: 20
    rpiCameraCodec: hardwareH264
    rpiCameraIDRPeriod: 10
    rpiCameraBitrate: 350000
    rpiCameraHardwareH264Profile: baseline
    rpiCameraHardwareH264Level: '4.1'
    rpiCameraDenoise: cdn_fast
