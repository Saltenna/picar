<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pi Car Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
      touch-action: none;
    }

    #live {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* H264 canvas — same footprint as the MJPEG img; hidden until H264 mode starts */
    #liveCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
    }

    #webrtcVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      background: black;
      object-fit: cover;
    }

    #status {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
    }

    #feedback {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      text-align: right;
      z-index: 100;
    }

    #enableBtn {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      font-size: 16px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
    }

    #menuBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: white;
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    #commandMenu {
      position: fixed;
      top: 50px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 5px;
      padding: 10px;
      display: none;
      z-index: 1000;
    }

    #commandMenu button {
      display: block;
      width: 100%;
      margin: 5px 0;
      padding: 6px 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Virtual joystick styles */
    .joystick-zone {
      position: fixed;
      bottom: 30px;
      width: 150px;
      height: 150px;
      z-index: 500;
      display: none;
    }
    #joystickLeft {
      left: 30px;
    }
    #joystickRight {
      right: 30px;
    }
    .joystick-base {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      position: relative;
    }
    .joystick-thumb {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .joystick-label {
      text-align: center;
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.6;
    }

    /* Keyboard hint for desktop */
    #keyboardHint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      display: none;
    }
    #keyboardHint kbd {
      display: inline-block;
      padding: 3px 7px;
      background: #555;
      border-radius: 3px;
      margin: 0 2px;
      font-family: monospace;
    }

    /* Button strip: centered row above joystick area */
    #btnStrip {
      position: fixed;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 600;
      pointer-events: none; /* pass taps through the container gap */
    }
    #btnStrip button {
      pointer-events: auto;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: bold;
      background: rgba(50, 50, 50, 0.8);
      color: #aaa;
      border: 1.5px solid #555;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
      line-height: 1.2;
    }
    #btnStrip #shiftBtn.high {
      background: rgba(0, 160, 80, 0.8);
      color: white;
      border-color: #0a6;
    }
    #btnStrip .tlock-btn.locked {
      background: rgba(200, 120, 0, 0.8);
      color: white;
      border-color: #c80;
    }
    /* Landscape: compact buttons near the bottom of the screen */
    @media (orientation: landscape) and (max-height: 500px) {
      #btnStrip { bottom: 8px; }
      #btnStrip button { padding: 4px 8px; font-size: 10px; }
    }

    #streamOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: rgba(0,0,0,0.7);
    }
    #streamOverlay.hidden { display: none; }
    #enableStreamBtn {
      padding: 15px 30px;
      font-size: 18px;
      background: #2a7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #streamStatus {
      color: #aaa;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <img id="live" src="" alt="Video stream not available">
  <canvas id="liveCanvas"></canvas>
  <video id="webrtcVideo" autoplay muted playsinline disablepictureinpicture></video>
  <div id="status">Status: Connecting...</div>
  <div id="feedback">Throttle: --<br>Steering: --</div>
  <button id="enableBtn" style="display:none;">Enable Orientation</button>
  <button id="menuBtn">☰</button>
  <div id="commandMenu">
    <button id="stopBtn" onclick="toggleStop()">Start</button>
    <button onclick="refreshPage()">Refresh Page</button>
    <button id="controlModeBtn" onclick="cycleControlMode()">Control: Auto</button>
  </div>

  <!-- Virtual joysticks (touch devices) -->
  <div id="joystickLeft" class="joystick-zone">
    <div class="joystick-base">
      <div class="joystick-thumb" id="thumbLeft"></div>
    </div>
    <div class="joystick-label">Throttle</div>
  </div>
  <div id="joystickRight" class="joystick-zone">
    <div class="joystick-base">
      <div class="joystick-thumb" id="thumbRight"></div>
    </div>
    <div class="joystick-label">Steering</div>
  </div>

  <!-- Shift / T-Lock button strip (centered above joysticks) -->
  <div id="btnStrip">
    <button id="tlockFrontBtn" class="tlock-btn">F.Diff: Open</button>
    <button id="shiftBtn">Gear: LOW</button>
    <button id="tlockRearBtn" class="tlock-btn">R.Diff: Open</button>
  </div>

  <!-- Stream certificate overlay -->
  <div id="streamOverlay">
    <div>
      <button id="enableStreamBtn">Enable Video Stream</button>
      <div id="streamStatus">Checking stream server...</div>
    </div>
  </div>

  <!-- Keyboard hint (desktop) -->
  <div id="keyboardHint">
    <kbd>W</kbd> / <kbd>↑</kbd> Forward &nbsp;
    <kbd>S</kbd> / <kbd>↓</kbd> Reverse<br>
    <kbd>A</kbd> / <kbd>←</kbd> Left &nbsp;
    <kbd>D</kbd> / <kbd>→</kbd> Right &nbsp;
    <kbd>Space</kbd> Stop
  </div>

  <script>
    const hostname = window.location.hostname;
    const legacyStreamBase = `https://${hostname}:8081`;
    const video = document.getElementById('live');

    // Socket.io for controls only (video is on separate port 8081)
    const socket = io(`https://${hostname}:8443`, { secure: true });

    const statusDiv = document.getElementById('status');
    const feedbackDiv = document.getElementById('feedback');
    const enableBtn = document.getElementById('enableBtn');
    const menuBtn = document.getElementById('menuBtn');
    const commandMenu = document.getElementById('commandMenu');
    const stopBtn = document.getElementById('stopBtn');
    const controlModeBtn = document.getElementById('controlModeBtn');
    const keyboardHint = document.getElementById('keyboardHint');
    const joystickLeftEl = document.getElementById('joystickLeft');
    const joystickRightEl = document.getElementById('joystickRight');
    const thumbLeft = document.getElementById('thumbLeft');
    const thumbRight = document.getElementById('thumbRight');
    const streamOverlay = document.getElementById('streamOverlay');
    const enableStreamBtn = document.getElementById('enableStreamBtn');
    const streamStatusDiv = document.getElementById('streamStatus');
    const webrtcVideo = document.getElementById('webrtcVideo');

    let stopped = true;
    let wakeLock = null;

    // ── Stream setup ─────────────────────────────────────────────────────────
    // Supports modes decided by the server's streamConfig event:
    //   'webrtc' → MediaMTX WHEP/WebRTC reader (https://host:8889/cam/whep)
    //   'avc1.*' → H264 WebSocket (wss://host:8081/stream) decoded via WebCodecs
    //   'mjpeg'  → classic MJPEG multipart image src (https://host:8081/stream.mjpg)
    //
    // ?stream=mjpeg, ?stream=h264, or ?stream=webrtc can force a client mode
    // for diagnostics, as long as the matching server/service is running.

    const canvasEl  = document.getElementById('liveCanvas');
    const canvasCtx = canvasEl.getContext('2d');

    // Sync canvas pixel dimensions to the physical screen size.
    // Must be called before each draw or after an orientation/resize event.
    function syncCanvasSize() {
      canvasEl.width  = window.innerWidth;
      canvasEl.height = window.innerHeight;
    }
    window.addEventListener('resize', syncCanvasSize);

    // Draw a VideoFrame onto the canvas using object-fit:cover semantics.
    function renderH264Frame(frame) {
      const cw = canvasEl.width,  ch = canvasEl.height;
      const fw = frame.codedWidth, fh = frame.codedHeight;
      // Scale so the frame fills the canvas without distortion (crops edges).
      const scale = Math.max(cw / fw, ch / fh);
      const dw = fw * scale, dh = fh * scale;
      canvasCtx.drawImage(frame, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
      frame.close();
    }

    // ── H264 WebSocket + WebCodecs decoder ───────────────────────────────────
    let h264Ws       = null;
    let videoDecoder = null;
    let webrtcPc = null;
    let webrtcSessionUrl = null;

    function stopH264Stream() {
      if (h264Ws) {
        try { h264Ws.onclose = null; h264Ws.close(); } catch (_) {}
        h264Ws = null;
      }
      if (videoDecoder && videoDecoder.state !== 'closed') {
        try { videoDecoder.close(); } catch (_) {}
      }
      videoDecoder = null;
    }

    function hideAllVideoSurfaces() {
      video.style.display = 'none';
      canvasEl.style.display = 'none';
      webrtcVideo.style.display = 'none';
    }

    function webrtcWhepUrlFromConfig(cfg) {
      const protocol = cfg.protocol || 'https';
      const port = cfg.port || 8889;
      const path = (cfg.path || 'cam').replace(/^\/+/, '');
      return `${protocol}://${hostname}:${port}/${path}/whep`;
    }

    async function stopWebRTCStream() {
      if (webrtcSessionUrl) {
        try { await fetch(webrtcSessionUrl, { method: 'DELETE' }); } catch (_) {}
        webrtcSessionUrl = null;
      }
      if (webrtcPc) {
        try { webrtcPc.close(); } catch (_) {}
        webrtcPc = null;
      }
      webrtcVideo.srcObject = null;
    }

    function waitIceGatheringComplete(pc) {
      if (pc.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise((resolve) => {
        const timeout = setTimeout(done, 5000);
        function done() {
          clearTimeout(timeout);
          pc.removeEventListener('icegatheringstatechange', onStateChange);
          resolve();
        }
        function onStateChange() {
          if (pc.iceGatheringState === 'complete') done();
        }
        pc.addEventListener('icegatheringstatechange', onStateChange);
      });
    }

    async function setupWebRTCStream(cfg) {
      stopH264Stream();
      await stopWebRTCStream();
      hideAllVideoSurfaces();
      webrtcVideo.style.display = 'block';
      streamOverlay.classList.add('hidden');

      const whepUrl = cfg.url || webrtcWhepUrlFromConfig(cfg);
      const pc = new RTCPeerConnection({ iceServers: [] });
      webrtcPc = pc;

      pc.addTransceiver('video', { direction: 'recvonly' });

      pc.ontrack = (evt) => {
        if (evt.streams && evt.streams[0]) {
          webrtcVideo.srcObject = evt.streams[0];
          // Explicit play() needed when srcObject is set after element is attached;
          // the `autoplay` attribute handles most cases but this is a safety net.
          webrtcVideo.play().catch(() => {});
        }
      };

      // Reconnect automatically when ICE fails.
      // 'disconnected' can recover on its own — only 'failed' is unrecoverable.
      // This keeps the video live through brief radio dropouts without operator action.
      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        console.log('WebRTC connection state:', s);
        if (s === 'failed') {
          console.log('WebRTC ICE failed — tearing down and reconnecting in 3 s…');
          stopWebRTCStream().then(() => {
            if (pendingStreamCfg && pendingStreamCfg.codec === 'webrtc') {
              setTimeout(() => setupWebRTCStream(pendingStreamCfg).catch(console.error), 3000);
            }
          });
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitIceGatheringComplete(pc);

      const res = await fetch(whepUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: pc.localDescription.sdp,
      });
      if (!res.ok) throw new Error(`WHEP offer failed: HTTP ${res.status}`);

      const location = res.headers.get('location');
      if (location) webrtcSessionUrl = new URL(location, whepUrl).toString();

      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    }

    function setupH264Stream(cfg) {
      hideAllVideoSurfaces();
      canvasEl.style.display = 'block';
      stopWebRTCStream();
      streamOverlay.classList.add('hidden');
      syncCanvasSize();

      if (!('VideoDecoder' in window)) {
        // Browser doesn't support WebCodecs — show a clear error.
        streamOverlay.classList.remove('hidden');
        enableStreamBtn.style.display  = 'none';
        streamStatusDiv.innerHTML =
          'H.264 requires Chrome / Edge or iOS Safari 16.4+.<br>' +
          'Switch the server to MJPEG mode (<code>stream_codec: "mjpeg"</code>) ' +
          'or use a supported browser.';
        return;
      }

      let decoderReady = false;
      let decodeTs     = 0;
      const tsStep     = Math.round(1_000_000 / (cfg.fps || 30));  // µs per frame

      // Parse the SPS NAL unit inside a keyframe packet to derive the exact
      // codec string (avc1.PPCCLL) that matches the encoder output.
      // This avoids the level/profile mismatch that makes WebCodecs reject the IDR
      // (e.g. declared avc1.42001f vs actual avc1.428028 from Pi 4 VideoCore IV).
      function parseSPSCodec(buf) {
        const u8 = new Uint8Array(buf);
        const toHex2 = n => n.toString(16).padStart(2, '0');
        for (let i = 0; i < u8.length - 4; i++) {
          // Match 4-byte start code 00 00 00 01
          if (u8[i] === 0 && u8[i+1] === 0 && u8[i+2] === 0 && u8[i+3] === 1) {
            if ((u8[i+4] & 0x1f) === 7 && i + 7 < u8.length) {
              return `avc1.${toHex2(u8[i+5])}${toHex2(u8[i+6])}${toHex2(u8[i+7])}`;
            }
          }
          // Match 3-byte start code 00 00 01
          if (u8[i] === 0 && u8[i+1] === 0 && u8[i+2] === 1) {
            if ((u8[i+3] & 0x1f) === 7 && i + 6 < u8.length) {
              return `avc1.${toHex2(u8[i+4])}${toHex2(u8[i+5])}${toHex2(u8[i+6])}`;
            }
          }
        }
        // Fallback to known Pi 4 VideoCore IV codec string
        return 'avc1.428028';
      }

      function initDecoder(codecStr) {
        if (videoDecoder && videoDecoder.state !== 'closed') {
          try { videoDecoder.reset(); } catch (_) {}
        }
        videoDecoder = new VideoDecoder({
          output: (frame) => {
            // If the decode queue is growing (network burst / slow render) drop
            // non-rendered frames to prevent the classic freeze-then-catch-up.
            if (videoDecoder.decodeQueueSize > 2) { frame.close(); return; }
            renderH264Frame(frame);
          },
          error: (err) => {
            console.warn('VideoDecoder error:', err.message);
            decoderReady = false;
            // Do NOT send requestKeyframe here — it triggers the encoder-restart
            // loop.  The --intra 15 setting guarantees an IDR every ~0.5 s.
          },
        });

        try {
          videoDecoder.configure({
            codec:                codecStr,
            codedWidth:           cfg.width  || 640,
            codedHeight:          cfg.height || 480,
            hardwareAcceleration: 'prefer-hardware',
            optimizeForLatency:   true,   // minimise internal decoder buffering
          });
          decoderReady = true;
          console.log('VideoDecoder configured with codec:', codecStr);
        } catch (e) {
          console.error('VideoDecoder configure error:', e);
          decoderReady = false;
        }
      }

      // Decoder is NOT initialised here — we wait for the first keyframe so we
      // can parse the SPS NAL and derive the exact codec string.

      function connectWs() {
        if (h264Ws) { try { h264Ws.close(); } catch (_) {} }

        // keyframeReceived: guards against the decoder receiving delta (P) frames
        // before its first IDR.  The server already gates new connections to
        // keyframes-only (wsPending), but this flag is a belt-and-suspenders
        // safety net and is also needed after a decoder reset.
        let keyframeReceived = false;
        let lastKfRequest    = 0;         // rate-limit requestKeyframe messages

        h264Ws = new WebSocket(`wss://${hostname}:8081/stream`);
        h264Ws.binaryType = 'arraybuffer';

        h264Ws.onopen = () => {
          console.log('H264 WebSocket connected');
          decodeTs = 0;
          keyframeReceived = false;
        };

        h264Ws.onmessage = (evt) => {
          const buf = evt.data;
          if (!(buf instanceof ArrayBuffer) || buf.byteLength < 5) return;

          // Packet layout: [flags:1][frameNum:4][h264-annexb-data]
          const view     = new DataView(buf);
          const isKey    = (view.getUint8(0) & 0x01) !== 0;
          const h264Data = buf.slice(5);

          // On the FIRST keyframe: parse the SPS to get the real codec string,
          // then initialise the decoder.  Deferring until here avoids the
          // level/profile mismatch (avc1.42001f declared vs avc1.428028 actual)
          // that caused WebCodecs to reject the first IDR immediately.
          if (!keyframeReceived) {
            if (!isKey) return;
            const detectedCodec = parseSPSCodec(h264Data);
            console.log('Detected codec from SPS:', detectedCodec);
            initDecoder(detectedCodec);
            if (!decoderReady) return;
            keyframeReceived = true;
          }

          // Re-initialise decoder after an error; only safe on a keyframe.
          if (!decoderReady) {
            if (!isKey) return;
            const detectedCodec = parseSPSCodec(h264Data);
            initDecoder(detectedCodec);
            if (!decoderReady) return;
            keyframeReceived = true;
          }

          // Drop non-keyframes when the decode queue is already deep — this
          // prevents the latency snowball that causes the freeze→burst pattern.
          if (!isKey && videoDecoder.decodeQueueSize > 2) return;

          try {
            videoDecoder.decode(new EncodedVideoChunk({
              type:      isKey ? 'key' : 'delta',
              timestamp: decodeTs,
              data:      h264Data,
            }));
            decodeTs += tsStep;
          } catch (e) {
            console.warn('Decode chunk error:', e);
            decoderReady    = false;
            keyframeReceived = false;
            // Request a keyframe but rate-limit to once per 5 s to avoid
            // triggering the encoder-restart loop seen in initial testing.
            const now = Date.now();
            if (now - lastKfRequest > 5000 && h264Ws.readyState === WebSocket.OPEN) {
              lastKfRequest = now;
              h264Ws.send(JSON.stringify({ type: 'requestKeyframe' }));
            }
          }
        };

        h264Ws.onerror = () => console.warn('H264 WebSocket error');

        h264Ws.onclose = () => {
          console.log('H264 WebSocket closed — reconnecting in 2 s');
          decoderReady    = false;
          keyframeReceived = false;
          setTimeout(connectWs, 2000);
        };
      }

      connectWs();
    }

    // ── startStream: dispatch to H264 or MJPEG ───────────────────────────────
    function startStream(cfg) {
      if (cfg && cfg.codec === 'webrtc') {
        setupWebRTCStream(cfg).catch((err) => {
          console.warn('WebRTC setup failed:', err);
          streamOverlay.classList.remove('hidden');
          enableStreamBtn.style.display = 'inline-block';
          streamStatusDiv.textContent = 'WebRTC stream failed. Tap to retry video.';
        });
      } else if (cfg && cfg.codec !== 'mjpeg') {
        setupH264Stream(cfg);
      } else {
        stopH264Stream();
        stopWebRTCStream();
        hideAllVideoSurfaces();
        video.style.display = 'block';
        video.src = `${legacyStreamBase}/stream.mjpg`;
        streamOverlay.classList.add('hidden');
      }
    }

    // ── Certificate acceptance flow ───────────────────────────────────────────
    // The video service uses the same self-signed cert as the control server.
    // The browser must accept it on the video port before HTTPS/WSS/WebRTC works.
    // We probe with a no-cors fetch; if it fails the user taps the overlay
    // button which opens the cert page in a popup.
    let streamCertOk    = false;
    let pendingStreamCfg = null;
    let pendingProbeUrl  = null;
    let pendingOpenUrl   = null;
    let certPollTimer    = null;

    const requestedStream = new URLSearchParams(window.location.search).get('stream');

    function normalizeStreamConfig(cfg) {
      if (requestedStream === 'mjpeg') return { codec: 'mjpeg' };
      if (requestedStream === 'h264') return { codec: 'avc1.42001f', width: cfg.width, height: cfg.height, fps: cfg.fps };
      if (requestedStream === 'webrtc') return { codec: 'webrtc', protocol: cfg.protocol, port: cfg.port, path: cfg.path, url: cfg.url };
      return cfg;
    }

    function setPendingStream(cfg) {
      pendingStreamCfg = normalizeStreamConfig(cfg);
      streamCertOk = false;

      if (pendingStreamCfg.codec === 'webrtc') {
        // Use the MediaMTX base URL for cert acceptance — the WHEP path only
        // accepts POST and returns "method not allowed" when opened in a browser.
        const cfg2 = pendingStreamCfg;
        const webrtcBase = `${cfg2.protocol || 'https'}://${hostname}:${cfg2.port || 8889}/`;
        pendingOpenUrl  = webrtcBase;
        pendingProbeUrl = webrtcBase;
      } else {
        pendingOpenUrl = `${legacyStreamBase}/`;
        pendingProbeUrl = pendingOpenUrl;
      }

      checkStreamCert();
    }

    function checkStreamCert() {
      if (!pendingStreamCfg || !pendingProbeUrl) return;
      streamStatusDiv.textContent = 'Checking stream server...';
      enableStreamBtn.style.display = 'none';
      fetch(pendingProbeUrl, { mode: 'no-cors' })
        .then(() => {
          streamCertOk = true;
          if (pendingStreamCfg) startStream(pendingStreamCfg);
        })
        .catch(() => {
          streamStatusDiv.textContent = 'Tap below to enable the video stream';
          enableStreamBtn.style.display = 'inline-block';
        });
    }

    function pollStreamCert() {
      if (certPollTimer) clearInterval(certPollTimer);
      let attempts = 0;
      certPollTimer = setInterval(() => {
        attempts++;
        if (streamCertOk || !pendingProbeUrl || attempts > 30) {
          clearInterval(certPollTimer);
          certPollTimer = null;
          return;
        }
        fetch(pendingProbeUrl, { mode: 'no-cors' })
          .then(() => {
            clearInterval(certPollTimer);
            certPollTimer = null;
            streamCertOk = true;
            if (pendingStreamCfg) startStream(pendingStreamCfg);
          })
          .catch(() => {});
      }, 1000);
    }

    enableStreamBtn.addEventListener('click', () => {
      streamStatusDiv.textContent = 'Accept the certificate in the popup…';
      const popup = window.open(pendingOpenUrl || `${legacyStreamBase}/`, '_blank', 'width=480,height=360');
      pollStreamCert();
      window.addEventListener('message', function onMsg(e) {
        if (e.data === 'stream-cert-ok') {
          window.removeEventListener('message', onMsg);
          streamCertOk = true;
          if (pendingStreamCfg) startStream(pendingStreamCfg);
        }
      });
      // Fallback: if the postMessage never arrives (popup blocker, old browser)
      // wait 5 s then try to start the stream anyway.
      setTimeout(() => {
        if (!streamCertOk && pendingStreamCfg && pendingStreamCfg.codec !== 'webrtc') {
          streamCertOk = true;
          startStream(pendingStreamCfg);
        }
      }, 5000);
    });

    // Receive stream config pushed by the server on Socket.io connect.
    socket.on('streamConfig', (cfg) => {
      setPendingStream(cfg);
    });

    // --- Device detection ---
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    // Control modes: 'joystick', 'keyboard', 'orientation'
    let controlMode = isTouchDevice ? 'joystick' : 'keyboard';
    let throttleValue = 0;
    let steeringValue = 0;
    let shiftValue = 1; // 1 = low gear, -1 = high gear (wiring reversed)
    let tlockFrontValue = 1; // 1 = open, -1 = locked (wiring reversed)
    let tlockRearValue = -1;  // -1 = open, 1 = locked
    let controlSendInterval = null;

    // Steering curve: dead zone + exponential for less sensitivity near center
    const STEERING_DEADZONE = 0.08;
    const STEERING_EXPO = 2.0;  // >1 = less sensitive near center, more at edges
    function applyCurve(raw) {
      const sign = Math.sign(raw);
      const abs = Math.abs(raw);
      if (abs < STEERING_DEADZONE) return 0;
      // Remap from [deadzone..1] to [0..1], then apply expo
      const remapped = (abs - STEERING_DEADZONE) / (1 - STEERING_DEADZONE);
      return sign * Math.pow(remapped, STEERING_EXPO);
    }

    function toggleShift() {
      const btn = document.getElementById('shiftBtn');
      if (shiftValue > 0) {
        shiftValue = -1;
        btn.textContent = 'Gear: HIGH';
        btn.classList.add('high');
      } else {
        shiftValue = 1;
        btn.textContent = 'Gear: LOW';
        btn.classList.remove('high');
      }
      sendControlValues();
    }

    function toggleTlockFront() {
      const btn = document.getElementById('tlockFrontBtn');
      if (tlockFrontValue > 0) {
        tlockFrontValue = -1;
        btn.textContent = 'F.Diff: Lock';
        btn.classList.add('locked');
      } else {
        tlockFrontValue = 1;
        btn.textContent = 'F.Diff: Open';
        btn.classList.remove('locked');
      }
      sendControlValues();
    }

    function toggleTlockRear() {
      const btn = document.getElementById('tlockRearBtn');
      if (tlockRearValue < 0) {
        tlockRearValue = 1;
        btn.textContent = 'R.Diff: Lock';
        btn.classList.add('locked');
      } else {
        tlockRearValue = -1;
        btn.textContent = 'R.Diff: Open';
        btn.classList.remove('locked');
      }
      sendControlValues();
    }

    // Make shift button work during active touch (joystick) and on desktop
    const shiftBtnEl = document.getElementById('shiftBtn');
    shiftBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleShift();
    }, { passive: false });
    shiftBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleShift();
    });

    // T-lock button handlers
    const tlockFrontBtnEl = document.getElementById('tlockFrontBtn');
    tlockFrontBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleTlockFront();
    }, { passive: false });
    tlockFrontBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleTlockFront();
    });

    const tlockRearBtnEl = document.getElementById('tlockRearBtn');
    tlockRearBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleTlockRear();
    }, { passive: false });
    tlockRearBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleTlockRear();
    });

    function activateControlMode(mode) {
      // Teardown previous mode
      deactivateAllControls();
      controlMode = mode;
      controlModeBtn.textContent = `Control: ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;

      if (mode === 'joystick') {
        joystickLeftEl.style.display = 'block';
        joystickRightEl.style.display = 'block';
        keyboardHint.style.display = 'none';
        enableBtn.style.display = 'none';
        statusDiv.textContent = 'Status: Joystick control';
      } else if (mode === 'keyboard') {
        joystickLeftEl.style.display = 'none';
        joystickRightEl.style.display = 'none';
        keyboardHint.style.display = 'block';
        enableBtn.style.display = 'none';
        statusDiv.textContent = 'Status: Keyboard control (WASD / Arrows)';
      } else if (mode === 'orientation') {
        joystickLeftEl.style.display = 'none';
        joystickRightEl.style.display = 'none';
        keyboardHint.style.display = 'none';
        requestOrientationPermission();
      }
    }

    function deactivateAllControls() {
      window.removeEventListener('deviceorientation', handleOrientation, true);
      throttleValue = 0;
      steeringValue = 0;
    }

    function currentSteeringCommand() {
      return controlMode === 'orientation' ? steeringValue : applyCurve(steeringValue);
    }

    function sendControlValues() {
      socket.volatile.emit('fromclient', {
        throttle: throttleValue,
        steering: currentSteeringCommand(),
        shift: shiftValue,
        tlock_front: tlockFrontValue,
        tlock_rear: tlockRearValue
      });
    }

    function startControlSendLoop() {
      if (controlSendInterval) return;
      sendControlValues();
      controlSendInterval = setInterval(() => {
        if (!stopped) sendControlValues();
      }, 50);
    }

    function stopControlSendLoop() {
      if (!controlSendInterval) return;
      clearInterval(controlSendInterval);
      controlSendInterval = null;
    }

    function cycleControlMode() {
      const modes = ['joystick', 'keyboard', 'orientation'];
      const next = modes[(modes.indexOf(controlMode) + 1) % modes.length];
      activateControlMode(next);
    }

    // --- Wake Lock ---
    async function requestWakeLock() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {});
      } catch (err) {
        console.error(`Wake Lock error: ${err.name}, ${err.message}`);
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    // --- Menu ---
    menuBtn.addEventListener('click', () => {
      commandMenu.style.display = commandMenu.style.display === 'block' ? 'none' : 'block';
    });

    // --- Startup ---
    window.addEventListener('load', () => {
      requestWakeLock();
      activateControlMode(controlMode);
    });

    // --- Stop / Disconnect ---
    function toggleStop() {
      if (!stopped) {
        // STOP: disarm and send neutral
        throttleValue = 0;
        steeringValue = 0;
        sendControlValues();
        stopControlSendLoop();
        socket.emit('disarm');
        stopBtn.textContent = 'Start';
        stopBtn.style.background = '#333';
        stopped = true;
        statusDiv.textContent = 'Status: DISARMED';
      } else {
        // START: arm the vehicle
        socket.emit('arm');
        startControlSendLoop();
        stopBtn.textContent = 'Stop';
        stopBtn.style.background = '#a33';
        stopped = false;
        statusDiv.textContent = 'Status: ARMED';
      }
    }

    function refreshPage() {
      window.location.reload();
    }

    // --- Orientation controls ---
    function requestOrientationPermission() {
      if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
              enableBtn.style.display = 'none';
              statusDiv.textContent = 'Status: Orientation control';
            } else {
              statusDiv.textContent = 'Status: Orientation permission denied';
            }
          }).catch(() => {
            statusDiv.textContent = 'Status: Orientation error';
          });
        } else {
          window.addEventListener('deviceorientation', handleOrientation, true);
          enableBtn.style.display = 'none';
          statusDiv.textContent = 'Status: Orientation control';
        }
      } else {
        statusDiv.textContent = 'Status: Orientation not supported';
      }
    }

    function handleOrientation(event) {
      if (stopped) return;
      const betadeg = event.beta;
      const gammadeg = event.gamma;
      throttleValue = Math.max(-1, Math.min(1, (45 - betadeg) / 50));
      steeringValue = applyCurve(Math.max(-1, Math.min(1, gammadeg / 25)));
      feedbackDiv.innerHTML =
        `Throttle: ${betadeg.toFixed(1)}&deg; &rarr; ${throttleValue.toFixed(2)}<br>` +
        `Steering: ${gammadeg.toFixed(1)}&deg; &rarr; ${steeringValue.toFixed(2)}<br>` +
        `Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
    }

    // --- Virtual joystick controls (touch) ---
    function setupJoystick(zoneEl, thumbEl, axis) {
      let active = false;
      let touchId = null;
      const baseRadius = 75; // half of 150px zone
      const thumbRadius = 25;
      const maxDist = baseRadius - thumbRadius;

      function getCenter() {
        const rect = zoneEl.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function handleMove(clientX, clientY) {
        const center = getCenter();
        let dx = clientX - center.x;
        let dy = clientY - center.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
          dx = (dx / dist) * maxDist;
          dy = (dy / dist) * maxDist;
        }
        thumbEl.style.left = (baseRadius + dx) + 'px';
        thumbEl.style.top = (baseRadius + dy) + 'px';

        if (axis === 'throttle') {
          // Up = positive throttle (forward), down = negative (reverse)
          throttleValue = -(dy / maxDist);
        } else {
          // Right = positive steering
          steeringValue = dx / maxDist;
        }
        sendJoystickValues();
      }

      function resetThumb() {
        thumbEl.style.left = '50%';
        thumbEl.style.top = '50%';
        thumbEl.style.transform = 'translate(-50%, -50%)';
        if (axis === 'throttle') throttleValue = 0;
        else steeringValue = 0;
        sendJoystickValues();
      }

      zoneEl.addEventListener('touchstart', (e) => {
        if (active) return;
        const t = e.changedTouches[0];
        touchId = t.identifier;
        active = true;
        thumbEl.style.transform = 'translate(-50%, -50%)';
        handleMove(t.clientX, t.clientY);
        e.preventDefault();
      }, { passive: false });

      zoneEl.addEventListener('touchmove', (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) {
            handleMove(t.clientX, t.clientY);
            e.preventDefault();
            break;
          }
        }
      }, { passive: false });

      const endTouch = (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) {
            active = false;
            touchId = null;
            resetThumb();
            e.preventDefault();
            break;
          }
        }
      };

      // Separate handler for touchcancel. Mobile browsers can fire this during
      // multi-touch transitions. Preserve throttle to avoid abrupt motor cuts,
      // but force steering back to center so it can't stick to one side.
      const cancelTouch = (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) {
            active = false;
            touchId = null;
            if (axis === 'throttle') {
              // Keep current throttle so transient touchcancel doesn't cause a
              // sudden brake/reverse event.
              console.log('touchcancel on throttle — value preserved at', throttleValue);
            } else {
              // Steering must fail-safe to center immediately on cancel.
              resetThumb();
              console.log('touchcancel on steering — reset to center');
            }
            e.preventDefault();
            break;
          }
        }
      };

      zoneEl.addEventListener('touchend', endTouch, { passive: false });
      zoneEl.addEventListener('touchcancel', cancelTouch, { passive: false });
    }

    let joystickSendInterval = null;
    function sendJoystickValues() {
      if (stopped) return;
      // Throttle UI feedback to ~20Hz; the shared control loop sends commands.
      if (joystickSendInterval) return;
      joystickSendInterval = setTimeout(() => {
        joystickSendInterval = null;
        const curvedSteering = applyCurve(steeringValue);
        feedbackDiv.innerHTML =
          `Throttle: ${throttleValue.toFixed(2)}<br>` +
          `Steering: ${curvedSteering.toFixed(2)}`;
      }, 50);
    }

    setupJoystick(joystickLeftEl, thumbLeft, 'throttle');
    setupJoystick(joystickRightEl, thumbRight, 'steering');

    // --- Keyboard controls (desktop) ---
    const keysDown = {};
    const KEY_THROTTLE_STEP = 0.05;
    const KEY_STEERING_STEP = 0.15;
    let keyboardInterval = null;

    function startKeyboardLoop() {
      if (keyboardInterval) return;
      keyboardInterval = setInterval(() => {
        if (stopped || controlMode !== 'keyboard') return;

        // Throttle
        if (keysDown['KeyW'] || keysDown['ArrowUp']) {
          throttleValue = Math.min(1, throttleValue + KEY_THROTTLE_STEP);
        } else if (keysDown['KeyS'] || keysDown['ArrowDown']) {
          throttleValue = Math.max(-1, throttleValue - KEY_THROTTLE_STEP);
        } else {
          // Decay toward zero
          if (Math.abs(throttleValue) < KEY_THROTTLE_STEP) throttleValue = 0;
          else throttleValue -= Math.sign(throttleValue) * KEY_THROTTLE_STEP;
        }

        // Steering
        if (keysDown['KeyA'] || keysDown['ArrowLeft']) {
          steeringValue = Math.max(-1, steeringValue - KEY_STEERING_STEP);
        } else if (keysDown['KeyD'] || keysDown['ArrowRight']) {
          steeringValue = Math.min(1, steeringValue + KEY_STEERING_STEP);
        } else {
          if (Math.abs(steeringValue) < KEY_STEERING_STEP) steeringValue = 0;
          else steeringValue -= Math.sign(steeringValue) * KEY_STEERING_STEP;
        }

        feedbackDiv.innerHTML =
          `Throttle: ${throttleValue.toFixed(2)}<br>` +
          `Steering: ${applyCurve(steeringValue).toFixed(2)}<br>` +
          `Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
      }, 50);
    }

    document.addEventListener('keydown', (e) => {
      if (controlMode !== 'keyboard') return;
      if (e.code === 'Space') {
        e.preventDefault();
        throttleValue = 0;
        steeringValue = 0;
        sendControlValues();
        feedbackDiv.innerHTML = `Throttle: 0.00<br>Steering: 0.00<br>Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
        return;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        e.preventDefault();
        toggleShift();
        return;
      }
      if (!keysDown[e.code]) {
        keysDown[e.code] = true;
        startKeyboardLoop();
      }
      // Prevent page scrolling with arrow keys
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', (e) => {
      delete keysDown[e.code];
      if (Object.keys(keysDown).length === 0 && keyboardInterval) {
        // Keep interval running briefly to allow decay
      }
    });

    // --- Socket status ---
    socket.on('connect', () => {
      statusDiv.textContent = `Status: Connected (${controlMode})`;
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = 'Status: Disconnected';
    });
  </script>
</body>
</html>
