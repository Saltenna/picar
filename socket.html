<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pi Car Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
      touch-action: none;
    }

    #live {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #status {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 100;
    }

    #feedback {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      text-align: right;
      z-index: 100;
    }

    #enableBtn {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      font-size: 16px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
    }

    #menuBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: white;
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    #commandMenu {
      position: fixed;
      top: 50px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 5px;
      padding: 10px;
      display: none;
      z-index: 1000;
    }

    #commandMenu button {
      display: block;
      width: 100%;
      margin: 5px 0;
      padding: 6px 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Virtual joystick styles */
    .joystick-zone {
      position: fixed;
      bottom: 30px;
      width: 150px;
      height: 150px;
      z-index: 500;
      display: none;
    }
    #joystickLeft {
      left: 30px;
    }
    #joystickRight {
      right: 30px;
    }
    .joystick-base {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      position: relative;
    }
    .joystick-thumb {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .joystick-label {
      text-align: center;
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.6;
    }

    /* Keyboard hint for desktop */
    #keyboardHint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      display: none;
    }
    #keyboardHint kbd {
      display: inline-block;
      padding: 3px 7px;
      background: #555;
      border-radius: 3px;
      margin: 0 2px;
      font-family: monospace;
    }

    #shiftBtn, .tlock-btn {
      position: fixed;
      bottom: 10px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      background: rgba(50, 50, 50, 0.8);
      color: #aaa;
      border: 2px solid #555;
      border-radius: 8px;
      cursor: pointer;
      z-index: 600;
      user-select: none;
      -webkit-user-select: none;
    }
    #shiftBtn {
      left: 50%;
      transform: translateX(-50%);
    }
    #tlockFrontBtn {
      left: 10px;
    }
    #tlockRearBtn {
      right: 10px;
    }
    #shiftBtn.high {
      background: rgba(0, 160, 80, 0.8);
      color: white;
      border-color: #0a6;
    }
    .tlock-btn.locked {
      background: rgba(200, 120, 0, 0.8);
      color: white;
      border-color: #c80;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/jmuxer.min.js"></script>
</head>
<body>
  <video id="live" autoplay muted playsinline></video>
  <div id="status">Status: Connecting...</div>
  <div id="feedback">Throttle: --<br>Steering: --</div>
  <button id="enableBtn" style="display:none;">Enable Orientation</button>
  <button id="menuBtn">☰</button>
  <div id="commandMenu">
    <button id="stopBtn" onclick="toggleStop()">Start</button>
    <button onclick="refreshPage()">Refresh Page</button>
    <button id="controlModeBtn" onclick="cycleControlMode()">Control: Auto</button>
  </div>

  <!-- Virtual joysticks (touch devices) -->
  <div id="joystickLeft" class="joystick-zone">
    <div class="joystick-base">
      <div class="joystick-thumb" id="thumbLeft"></div>
    </div>
    <div class="joystick-label">Throttle</div>
  </div>
  <div id="joystickRight" class="joystick-zone">
    <div class="joystick-base">
      <div class="joystick-thumb" id="thumbRight"></div>
    </div>
    <div class="joystick-label">Steering</div>
  </div>

  <!-- Shift toggle -->
  <button id="shiftBtn">Gear: LOW</button>

  <!-- T-Lock diff toggles -->
  <button id="tlockFrontBtn" class="tlock-btn">Front: Open</button>
  <button id="tlockRearBtn" class="tlock-btn">Rear: Open</button>

  <!-- Stream overlay removed — H.264 streams via socket.io now -->

  <!-- Keyboard hint (desktop) -->
  <div id="keyboardHint">
    <kbd>W</kbd> / <kbd>↑</kbd> Forward &nbsp;
    <kbd>S</kbd> / <kbd>↓</kbd> Reverse<br>
    <kbd>A</kbd> / <kbd>←</kbd> Left &nbsp;
    <kbd>D</kbd> / <kbd>→</kbd> Right &nbsp;
    <kbd>Space</kbd> Stop
  </div>

  <script>
    const hostname = window.location.hostname;
    const video = document.getElementById('live');

    // Separate sockets: video stream won't block control commands
    const videoSocket = io(`https://${hostname}:8443/video`, { secure: true });
    const socket = io(`https://${hostname}:8443/control`, { secure: true });

    // --- H.264 stream via jMuxer ---
    const jmuxer = new JMuxer({
      node: 'live',
      mode: 'video',
      flushingTime: 100,
      fps: 20,
      debug: false
    });

    videoSocket.on('h264data', (data) => {
      jmuxer.feed({ video: new Uint8Array(data) });
    });

    // Try to play video on user interaction (mobile autoplay policy)
    document.addEventListener('touchstart', () => {
      if (video.paused) video.play().catch(() => {});
    }, { once: true });

    const statusDiv = document.getElementById('status');
    const feedbackDiv = document.getElementById('feedback');
    const enableBtn = document.getElementById('enableBtn');
    const menuBtn = document.getElementById('menuBtn');
    const commandMenu = document.getElementById('commandMenu');
    const stopBtn = document.getElementById('stopBtn');
    const controlModeBtn = document.getElementById('controlModeBtn');
    const keyboardHint = document.getElementById('keyboardHint');
    const joystickLeftEl = document.getElementById('joystickLeft');
    const joystickRightEl = document.getElementById('joystickRight');
    const thumbLeft = document.getElementById('thumbLeft');
    const thumbRight = document.getElementById('thumbRight');

    let stopped = true;
    let wakeLock = null;

    // --- Device detection ---
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    // Control modes: 'joystick', 'keyboard', 'orientation'
    let controlMode = isTouchDevice ? 'joystick' : 'keyboard';
    let throttleValue = 0;
    let steeringValue = 0;
    let shiftValue = 1; // 1 = low gear, -1 = high gear (wiring reversed)
    let tlockFrontValue = 1; // 1 = open, -1 = locked (wiring reversed)
    let tlockRearValue = -1;  // -1 = open, 1 = locked

    // Steering curve: dead zone + exponential for less sensitivity near center
    const STEERING_DEADZONE = 0.08;
    const STEERING_EXPO = 2.0;  // >1 = less sensitive near center, more at edges
    function applyCurve(raw) {
      const sign = Math.sign(raw);
      const abs = Math.abs(raw);
      if (abs < STEERING_DEADZONE) return 0;
      // Remap from [deadzone..1] to [0..1], then apply expo
      const remapped = (abs - STEERING_DEADZONE) / (1 - STEERING_DEADZONE);
      return sign * Math.pow(remapped, STEERING_EXPO);
    }

    function toggleShift() {
      const btn = document.getElementById('shiftBtn');
      if (shiftValue > 0) {
        shiftValue = -1;
        btn.textContent = 'Gear: HIGH';
        btn.classList.add('high');
      } else {
        shiftValue = 1;
        btn.textContent = 'Gear: LOW';
        btn.classList.remove('high');
      }
      // Send immediately so shift takes effect without waiting for joystick/keyboard
      socket.emit('fromclient', { throttle: throttleValue, steering: steeringValue, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
    }

    function toggleTlockFront() {
      const btn = document.getElementById('tlockFrontBtn');
      if (tlockFrontValue > 0) {
        tlockFrontValue = -1;
        btn.textContent = 'Front: Locked';
        btn.classList.add('locked');
      } else {
        tlockFrontValue = 1;
        btn.textContent = 'Front: Open';
        btn.classList.remove('locked');
      }
      socket.emit('fromclient', { throttle: throttleValue, steering: steeringValue, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
    }

    function toggleTlockRear() {
      const btn = document.getElementById('tlockRearBtn');
      if (tlockRearValue < 0) {
        tlockRearValue = 1;
        btn.textContent = 'Rear: Locked';
        btn.classList.add('locked');
      } else {
        tlockRearValue = -1;
        btn.textContent = 'Rear: Open';
        btn.classList.remove('locked');
      }
      socket.emit('fromclient', { throttle: throttleValue, steering: steeringValue, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
    }

    // Make shift button work during active touch (joystick) and on desktop
    const shiftBtnEl = document.getElementById('shiftBtn');
    shiftBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleShift();
    }, { passive: false });
    shiftBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleShift();
    });

    // T-lock button handlers
    const tlockFrontBtnEl = document.getElementById('tlockFrontBtn');
    tlockFrontBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleTlockFront();
    }, { passive: false });
    tlockFrontBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleTlockFront();
    });

    const tlockRearBtnEl = document.getElementById('tlockRearBtn');
    tlockRearBtnEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleTlockRear();
    }, { passive: false });
    tlockRearBtnEl.addEventListener('click', (e) => {
      if (!isTouchDevice) toggleTlockRear();
    });

    function activateControlMode(mode) {
      // Teardown previous mode
      deactivateAllControls();
      controlMode = mode;
      controlModeBtn.textContent = `Control: ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;

      if (mode === 'joystick') {
        joystickLeftEl.style.display = 'block';
        joystickRightEl.style.display = 'block';
        keyboardHint.style.display = 'none';
        enableBtn.style.display = 'none';
        statusDiv.textContent = 'Status: Joystick control';
      } else if (mode === 'keyboard') {
        joystickLeftEl.style.display = 'none';
        joystickRightEl.style.display = 'none';
        keyboardHint.style.display = 'block';
        enableBtn.style.display = 'none';
        statusDiv.textContent = 'Status: Keyboard control (WASD / Arrows)';
      } else if (mode === 'orientation') {
        joystickLeftEl.style.display = 'none';
        joystickRightEl.style.display = 'none';
        keyboardHint.style.display = 'none';
        requestOrientationPermission();
      }
    }

    function deactivateAllControls() {
      window.removeEventListener('deviceorientation', handleOrientation, true);
      throttleValue = 0;
      steeringValue = 0;
    }

    function cycleControlMode() {
      const modes = ['joystick', 'keyboard', 'orientation'];
      const next = modes[(modes.indexOf(controlMode) + 1) % modes.length];
      activateControlMode(next);
    }

    // --- Wake Lock ---
    async function requestWakeLock() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {});
      } catch (err) {
        console.error(`Wake Lock error: ${err.name}, ${err.message}`);
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    // --- Menu ---
    menuBtn.addEventListener('click', () => {
      commandMenu.style.display = commandMenu.style.display === 'block' ? 'none' : 'block';
    });

    // --- Startup ---
    window.addEventListener('load', () => {
      requestWakeLock();
      activateControlMode(controlMode);
    });

    // --- Stop / Disconnect ---
    function toggleStop() {
      if (!stopped) {
        // STOP: disarm and send neutral
        socket.emit('fromclient', { throttle: 0, steering: 0, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
        socket.emit('disarm');
        stopBtn.textContent = 'Start';
        stopBtn.style.background = '#333';
        stopped = true;
        statusDiv.textContent = 'Status: DISARMED';
      } else {
        // START: arm the vehicle
        socket.emit('arm');
        stopBtn.textContent = 'Stop';
        stopBtn.style.background = '#a33';
        stopped = false;
        statusDiv.textContent = 'Status: ARMED';
      }
    }

    function refreshPage() {
      window.location.reload();
    }

    // --- Orientation controls ---
    function requestOrientationPermission() {
      if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
              enableBtn.style.display = 'none';
              statusDiv.textContent = 'Status: Orientation control';
            } else {
              statusDiv.textContent = 'Status: Orientation permission denied';
            }
          }).catch(() => {
            statusDiv.textContent = 'Status: Orientation error';
          });
        } else {
          window.addEventListener('deviceorientation', handleOrientation, true);
          enableBtn.style.display = 'none';
          statusDiv.textContent = 'Status: Orientation control';
        }
      } else {
        statusDiv.textContent = 'Status: Orientation not supported';
      }
    }

    function handleOrientation(event) {
      if (stopped) return;
      const betadeg = event.beta;
      const gammadeg = event.gamma;
      const throttle = Math.max(-1, Math.min(1, (45 - betadeg) / 50));
      const steering = applyCurve(Math.max(-1, Math.min(1, gammadeg / 25)));
      socket.emit('fromclient', { throttle, steering, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
      feedbackDiv.innerHTML =
        `Throttle: ${betadeg.toFixed(1)}&deg; &rarr; ${throttle.toFixed(2)}<br>` +
        `Steering: ${gammadeg.toFixed(1)}&deg; &rarr; ${steering.toFixed(2)}<br>` +
        `Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
    }

    // --- Virtual joystick controls (touch) ---
    function setupJoystick(zoneEl, thumbEl, axis) {
      let active = false;
      let touchId = null;
      const baseRadius = 75; // half of 150px zone
      const thumbRadius = 25;
      const maxDist = baseRadius - thumbRadius;

      function getCenter() {
        const rect = zoneEl.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function handleMove(clientX, clientY) {
        const center = getCenter();
        let dx = clientX - center.x;
        let dy = clientY - center.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
          dx = (dx / dist) * maxDist;
          dy = (dy / dist) * maxDist;
        }
        thumbEl.style.left = (baseRadius + dx) + 'px';
        thumbEl.style.top = (baseRadius + dy) + 'px';

        if (axis === 'throttle') {
          // Up = positive throttle (forward), down = negative (reverse)
          throttleValue = -(dy / maxDist);
        } else {
          // Right = positive steering
          steeringValue = dx / maxDist;
        }
        sendJoystickValues();
      }

      function resetThumb() {
        thumbEl.style.left = '50%';
        thumbEl.style.top = '50%';
        thumbEl.style.transform = 'translate(-50%, -50%)';
        if (axis === 'throttle') throttleValue = 0;
        else steeringValue = 0;
        sendJoystickValues();
      }

      zoneEl.addEventListener('touchstart', (e) => {
        if (active) return;
        const t = e.changedTouches[0];
        touchId = t.identifier;
        active = true;
        thumbEl.style.transform = 'translate(-50%, -50%)';
        handleMove(t.clientX, t.clientY);
        e.preventDefault();
      }, { passive: false });

      zoneEl.addEventListener('touchmove', (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) {
            handleMove(t.clientX, t.clientY);
            e.preventDefault();
            break;
          }
        }
      }, { passive: false });

      const endTouch = (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) {
            active = false;
            touchId = null;
            resetThumb();
            e.preventDefault();
            break;
          }
        }
      };
      zoneEl.addEventListener('touchend', endTouch, { passive: false });
      zoneEl.addEventListener('touchcancel', endTouch, { passive: false });
    }

    let joystickSendInterval = null;
    function sendJoystickValues() {
      if (stopped) return;
      // Throttle sending to ~20Hz to avoid flooding
      if (joystickSendInterval) return;
      joystickSendInterval = setTimeout(() => {
        joystickSendInterval = null;
        const curvedSteering = applyCurve(steeringValue);
        socket.emit('fromclient', { throttle: throttleValue, steering: curvedSteering, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
        feedbackDiv.innerHTML =
          `Throttle: ${throttleValue.toFixed(2)}<br>` +
          `Steering: ${curvedSteering.toFixed(2)}`;
      }, 50);
    }

    setupJoystick(joystickLeftEl, thumbLeft, 'throttle');
    setupJoystick(joystickRightEl, thumbRight, 'steering');

    // --- Keyboard controls (desktop) ---
    const keysDown = {};
    const KEY_THROTTLE_STEP = 0.05;
    const KEY_STEERING_STEP = 0.15;
    let keyboardInterval = null;

    function startKeyboardLoop() {
      if (keyboardInterval) return;
      keyboardInterval = setInterval(() => {
        if (stopped || controlMode !== 'keyboard') return;

        // Throttle
        if (keysDown['KeyW'] || keysDown['ArrowUp']) {
          throttleValue = Math.min(1, throttleValue + KEY_THROTTLE_STEP);
        } else if (keysDown['KeyS'] || keysDown['ArrowDown']) {
          throttleValue = Math.max(-1, throttleValue - KEY_THROTTLE_STEP);
        } else {
          // Decay toward zero
          if (Math.abs(throttleValue) < KEY_THROTTLE_STEP) throttleValue = 0;
          else throttleValue -= Math.sign(throttleValue) * KEY_THROTTLE_STEP;
        }

        // Steering
        if (keysDown['KeyA'] || keysDown['ArrowLeft']) {
          steeringValue = Math.max(-1, steeringValue - KEY_STEERING_STEP);
        } else if (keysDown['KeyD'] || keysDown['ArrowRight']) {
          steeringValue = Math.min(1, steeringValue + KEY_STEERING_STEP);
        } else {
          if (Math.abs(steeringValue) < KEY_STEERING_STEP) steeringValue = 0;
          else steeringValue -= Math.sign(steeringValue) * KEY_STEERING_STEP;
        }

        socket.emit('fromclient', { throttle: throttleValue, steering: applyCurve(steeringValue), shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
        feedbackDiv.innerHTML =
          `Throttle: ${throttleValue.toFixed(2)}<br>` +
          `Steering: ${applyCurve(steeringValue).toFixed(2)}<br>` +
          `Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
      }, 50);
    }

    document.addEventListener('keydown', (e) => {
      if (controlMode !== 'keyboard') return;
      if (e.code === 'Space') {
        e.preventDefault();
        throttleValue = 0;
        steeringValue = 0;
        socket.emit('fromclient', { throttle: 0, steering: 0, shift: shiftValue, tlock_front: tlockFrontValue, tlock_rear: tlockRearValue });
        feedbackDiv.innerHTML = `Throttle: 0.00<br>Steering: 0.00<br>Gear: ${shiftValue > 0 ? 'HIGH' : 'LOW'}`;
        return;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        e.preventDefault();
        toggleShift();
        return;
      }
      if (!keysDown[e.code]) {
        keysDown[e.code] = true;
        startKeyboardLoop();
      }
      // Prevent page scrolling with arrow keys
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', (e) => {
      delete keysDown[e.code];
      if (Object.keys(keysDown).length === 0 && keyboardInterval) {
        // Keep interval running briefly to allow decay
      }
    });

    // --- Socket status ---
    socket.on('connect', () => {
      statusDiv.textContent = `Status: Connected (${controlMode})`;
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = 'Status: Disconnected';
    });
  </script>
</body>
</html>
